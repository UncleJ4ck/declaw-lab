# declaw-lab: a throwaway Android phone in a container, for testing declaw-patched apps.
#
# `docker compose up -d` boots a rooted Android 11 in about 6 seconds. It runs on the
# host kernel (no QEMU), and its ABI list is x86_64 + arm64-v8a + armeabi-v7a, so the
# arm-only libflutter.so inside these apps runs translated.
#
# You interact with it as a real phone through scrcpy (see ./phone ui) and drop patched
# APKs into ./apks (see ./phone apk). adb is exposed on localhost:5556.
#
# Host requirements (Linux): a kernel with binder + ashmem/memfd (redroid's own docs
# list them). This machine already satisfies them.
services:
  phone:
    image: redroid/redroid:${REDROID_VER:-11.0.0-latest}
    container_name: declaw-phone
    privileged: true
    command:
      - androidboot.redroid_gpu_mode=guest
      - androidboot.hardware=redroid
    volumes:
      - ./data:/data
    ports:
      - "5556:5555"      # adb: adb connect localhost:5556
    restart: unless-stopped
